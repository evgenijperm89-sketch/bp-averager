<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Усреднение артериального давления</title>
    <style>
        :root {
            --primary: #0d6efd;
            --primary-hover: #0b5ed7;
            --bg: #f4f6f9;
            --card: #ffffff;
            --text: #212529;
            --muted: #6c757d;
            --success: #198754;
            --error: #dc3545;
            --radius: 12px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: var(--radius);
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 480px;
        }
        h1 { text-align: center; margin: 0 0 1.5rem; font-size: 1.5rem; }
        .measurement {
            background: #f8f9fa;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        .measurement h3 { margin: 0 0 0.75rem; font-size: 1rem; color: var(--muted); }
        .input-row { display: flex; gap: 10px; }
        label { display: flex; flex-direction: column; flex: 1; font-size: 0.85rem; color: var(--muted); }
        input {
            padding: 10px;            border: 1px solid #dee2e6;
            border-radius: 6px;
            font-size: 1rem;
            margin-top: 4px;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13,110,253,0.15); }
        .buttons { display: flex; gap: 10px; margin-top: 0.5rem; }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        button:active { transform: scale(0.98); }
        .btn-calc { background: var(--primary); color: white; }
        .btn-calc:hover { background: var(--primary-hover); }
        .btn-clear { background: #e9ecef; color: var(--text); }
        .btn-clear:hover { background: #dee2e6; }
        #result {
            margin-top: 1.5rem;
            padding: 1rem;
            background: #d1e7dd;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        #result.error { background: #f8d7da; color: var(--error); }
        #result h2 { margin: 0 0 0.5rem; font-size: 1.2rem; }
        #result .value { font-size: 1.8rem; font-weight: bold; color: var(--success); }
        #result.error .value { color: var(--error); }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 Среднее давление</h1>
        <form id="bpForm">
            <div class="measurement">
                <h3>Замер 1</h3>
                <div class="input-row">
                    <label>Систолическое <input type="number" id="sys1" min="50" max="300" required placeholder="напр. 120"></label>
                    <label>Диастолическое <input type="number" id="dia1" min="30" max="200" required placeholder="напр. 80"></label>
                </div>
            </div>
            <div class="measurement">
                <h3>Замер 2</h3>
                <div class="input-row">                    <label>Систолическое <input type="number" id="sys2" min="50" max="300" required placeholder="напр. 118"></label>
                    <label>Диастолическое <input type="number" id="dia2" min="30" max="200" required placeholder="напр. 78"></label>
                </div>
            </div>
            <div class="measurement">
                <h3>Замер 3</h3>
                <div class="input-row">
                    <label>Систолическое <input type="number" id="sys3" min="50" max="300" required placeholder="напр. 122"></label>
                    <label>Диастолическое <input type="number" id="dia3" min="30" max="200" required placeholder="напр. 82"></label>
                </div>
            </div>
            <div class="buttons">
                <button type="submit" class="btn-calc">Рассчитать</button>
                <button type="button" class="btn-clear" id="clearBtn">Очистить</button>
            </div>
        </form>
        <div id="result"></div>
    </div>

    <script>
        const form = document.getElementById('bpForm');
        const resultDiv = document.getElementById('result');
        const clearBtn = document.getElementById('clearBtn');

        function showResult(html, isError = false) {
            resultDiv.innerHTML = html;
            resultDiv.className = isError ? 'error' : '';
            resultDiv.style.display = 'block';
        }

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            resultDiv.style.display = 'none';

            const ids = ['sys1','sys2','sys3','dia1','dia2','dia3'];
            const vals = ids.map(id => parseInt(document.getElementById(id).value));

            // Проверка на пустые поля
            if (vals.some(v => isNaN(v))) {
                return showResult('<h2>Ошибка</h2><div class="value">Заполните все поля корректными числами</div>', true);
            }

            const [sys1, sys2, sys3, dia1, dia2, dia3] = vals;

            // Медицинская логика: диастолическое не может быть ≥ систолического
            if (dia1 >= sys1 || dia2 >= sys2 || dia3 >= sys3) {
                return showResult('<h2>Ошибка</h2><div class="value">Нижнее давление должно быть меньше верхнего в каждом замере</div>', true);
            }

            // Расчёт среднего            const avgSys = Math.round((sys1 + sys2 + sys3) / 3);
            const avgDia = Math.round((dia1 + dia2 + dia3) / 3);

            showResult(`
                <h2>Среднее значение</h2>
                <div class="value">${avgSys} / ${avgDia} мм рт. ст.</div>
            `);
        });

        clearBtn.addEventListener('click', () => {
            form.reset();
            resultDiv.style.display = 'none';
        });
    </script>
</body>
  </html>
